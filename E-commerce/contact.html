<body class="contact-bg">
        <nav class="navbar">
    <ul>
      <li class="li-hover-effect"><a href="../E-commerce/index.html">Home</a></li>
      <li class="li-hover-effect"><a href="../E-commerce/shop.html">Shop</a></li>
      <li class="li-hover-effect"><a href="../E-commerce/contact.html">Contact</a></li>
      <li class="li-hover-effect"><a href="../E-commerce/about.html">About</a></li>
    </ul>

    <div class="icons">
      <a href="../E-commerce/cart.html">
        <i class="fa-solid fa-cart-shopping"></i>
      </a>
      <i class="fa-regular fa-heart"></i>
    </div>

      <section class="contact-container">
    <div class="contact-left">
      <h1>Get in touch.</h1>
      <p class="sub-text">Start a conversation with us anytime.</p>
    </div>
    <div class="contact-right">

      <div class="contact-box">
        <i class="fa-solid fa-location-dot"></i>
        <div>
          <h3>Address</h3>
          <p>Cairo, Egypt</p>
        </div>
      </div>

      <div class="contact-box">
        <i class="fa-solid fa-phone"></i>
        <div>
          <h3>Phone</h3>
          <p>+20 123 456 789</p>
        </div>
      </div>

      <div class="contact-box">
        <i class="fa-solid fa-envelope"></i>
        <div>
          <h3>Email</h3>
          <p>store@email.com</p>
        </div>
      </div>

      <div class="contact-box">
        <i class="fa-solid fa-share-nodes"></i>
        <div>
          <h3>Follow Us</h3>
          <div class="socials">
            <i class="fa-brands fa-facebook"></i>
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-twitter"></i>
          </div>
        </div>
      </div>

    </div>

  </section>
